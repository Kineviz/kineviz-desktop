name: Update Stable Version

# 手动触发：选取一个 Release 作为最新稳定版，更新 README 并提交
# Manually triggered: pick a release as the latest stable version, update the README, and commit.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version to mark as stable (e.g. v0.2.0 or 0.2.0). Leave empty to use the latest release."
        required: false
        default: ""

# 允许工作流推送提交 / allow the workflow to push commits
permissions:
  contents: write

jobs:
  update-stable-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update stable version and commit
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x update-stable-version.sh update-version.sh
          ./update-stable-version.sh "${{ github.event.inputs.version }}"

      - name: Push changes
        if: steps.update.outputs.changed == 'true'
        run: git push

      - name: Announce new stable version on Slack
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.update.outputs.version }}
          TAG: ${{ steps.update.outputs.tag }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "SLACK_WEBHOOK_URL secret is not set; skipping Slack notification." >&2
            exit 0
          fi
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          # 抓取 Release 说明 / fetch the release notes
          NOTES="$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body' || true)"
          # Slack 文本上限较保守地截断 / truncate conservatively to stay under Slack's text limits
          MAX_LEN=2500
          if [[ "${#NOTES}" -gt "$MAX_LEN" ]]; then
            NOTES="${NOTES:0:$MAX_LEN}"$'\n\n…'"<${RELEASE_URL}|Read the full release notes>"
          fi

          HEADER=":rocket: *Kineviz Desktop ${VERSION}* is now the latest stable version! <${RELEASE_URL}|View the release>"
          if [[ -n "$NOTES" ]]; then
            TEXT="${HEADER}"$'\n\n*Release notes:*\n'"${NOTES}"
          else
            TEXT="$HEADER"
          fi

          payload="$(jq -n --arg text "$TEXT" '{text: $text}')"
          curl -sS -f -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
